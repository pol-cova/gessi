<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gessi standalone HTML example</title>
    <script type="module" src="../dist/gessi.js"></script>
  </head>
  <body class="gs-page">
    <gessi-desktop menu="◆ Static OS,File,View,Help" clock="09:41">
      <gessi-window title="hello.html" width="38rem" active draggable>
        <h1>One script, plain HTML</h1>
        <p>No package manager, bundler, or framework runtime is required.</p>
      </gessi-window>
    </gessi-desktop>
  </body>
</html>

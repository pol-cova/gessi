<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gessi no-JavaScript fallback</title>
    <link rel="stylesheet" href="../dist/gessi.css">
  </head>
  <body class="gs-page">
    <gessi-desktop>
      <gessi-window title="Readable without JavaScript">
        <nav slot="toolbar">Static toolbar</nav>
        <h1>The content remains available</h1>
        <p>Interaction is optional progressive enhancement.</p>
        <span slot="status">No JavaScript</span>
      </gessi-window>
    </gessi-desktop>
  </body>
</html>

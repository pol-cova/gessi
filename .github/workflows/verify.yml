name: verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build published assets
        run: npm run build

      - name: Verify source and package output
        run: npm run check

      - name: Build documentation
        run: npm run docs:build

      - name: Validate package contents
        run: npm pack --dry-run
